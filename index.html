<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; gap: 40px; padding: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .cart { border-left: 2px solid #eee; padding-left: 40px; width: 300px; }
        .product { padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="grid" id="store"></div>
    <div class="cart" id="cart">
        <h2>Cart</h2>
        <div id="cart-items"></div>
        <h3 id="total">Total: $0</h3>
        <button id="checkout-btn" style="display:none;" onclick="alert('Proceeding to Stripe...')">Checkout</button>
    </div>

    <script>
        const products = [
            { id: 1, name: "Headphones", price: 49.99 },
            { id: 2, name: "Smart Watch", price: 89.99 }
        ];
        let cart = [];

        function render() {
            const storeDiv = document.getElementById('store');
            storeDiv.innerHTML = products.map(p => `
                <div class="product">
                    <h3>${p.name}</h3>
                    <p>$${p.price}</p>
                    <button onclick="addToCart(${p.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push(p);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map(item => `<li>${item.name} - $${item.price}</li>`).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total').innerText = `Total: $${total.toFixed(2)}`;
            document.getElementById('checkout-btn').style.display = cart.length > 0 ? 'block' : 'none';
        }

        render();
    </script>
</body>
</html>
