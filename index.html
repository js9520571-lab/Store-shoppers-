<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        button { background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="grid" id="store"></div>

    <script>
        // Your Database (Add new products here)
        const products = [
            { name: "Wireless Headphones", price: "$49.99", link: "https://buy.stripe.com/test_1" },
            { name: "Smart Watch", price: "$89.99", link: "https://buy.stripe.com/test_2" },
            { name: "Portable Charger", price: "$29.99", link: "https://buy.stripe.com/test_3" }
        ];

        const store = document.getElementById('store');
        
        products.forEach(p => {
            store.innerHTML += `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p>Price: ${p.price}</p>
                    <button onclick="window.location.href='${p.link}'">Checkout</button>
                </div>
            `;
        });
    </script>
</body>
</html>
